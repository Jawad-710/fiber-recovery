<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idoom Fiber Recovery Tool - مطور</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');

:root {
    --primary: #00f2fe;
    --card-bg: #1e1e1e;
    --bg: #121212;
    --text: #fff;
}

body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 15px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
}

.container {
    background: var(--card-bg);
    border-radius: 25px;
    padding: 25px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    text-align: center;
    box-sizing: border-box;
}

input {
    width: 100%;
    padding: 15px;
    margin: 15px 0;
    border-radius: 12px;
    border: 2px solid #333;
    background: #2d2d2d;
    color: #fff;
    text-align: center;
    font-size: 18px;
    box-sizing: border-box;
    outline: none;
}

input:focus {
    border-color: var(--primary);
}

button {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 12px;
    font-weight: bold;
    cursor: pointer;
    font-size: 18px;
    transition: 0.3s;
    margin-bottom: 10px;
}

.button-generate { background: linear-gradient(90deg, #4facfe, #00f2fe); }
.button-reset { background: #ff6b6b; }
.button-auto { background: #1dd1a1; }

button:hover { transform: translateY(-2px); opacity: 0.9; }

.result-area {
    margin-top: 20px;
    display: none;
    padding: 20px;
    background: rgba(0,255,204,0.05);
    border-radius: 15px;
    border: 1px dashed #444;
    text-align: center;
    transition: all 0.3s;
}

#pass {
    display: block;
    margin: 15px 0;
    font-size: 28px;
    color: var(--primary);
    font-family: monospace;
    letter-spacing: 2px;
    background: #262626;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #333;
    word-break: break-all;
    cursor: pointer;
    user-select: all;
}

.qr-box {
    background: white;
    padding: 10px;
    border-radius: 15px;
    display: inline-block;
    margin-top: 10px;
}

.qr-box img {
    display: block;
    max-width: 200px;
}

.toggle-theme {
    margin-bottom: 15px;
    font-size: 14px;
    cursor: pointer;
    color: var(--primary);
    text-decoration: underline;
}
</style>
</head>
<body>

<div class="container">
    <h2>استرجاع كلمة السر 🇩🇿</h2>
    <p style="font-size: 13px; color: #aaa;">خاص بمودم FiberHome (إيدوم فيبر)</p>
    
    <div class="toggle-theme" onclick="toggleTheme()">تبديل الثيم 🌙/☀️</div>

    <input type="text" id="ssid" placeholder="أدخل SSID (مثال: fh_6f0088)">
    <button class="button-generate" onclick="calc()">توليد البيانات</button>
    <button class="button-reset" onclick="resetFields()">إعادة تعيين</button>

    <div class="result-area" id="res">
        <small style="color: #aaa;">كلمة السر الافتراضية هي (اضغط للنسخ):</small>
        <b id="pass"></b>
        <small style="color: #aaa;">امسح الكود للاتصال الفوري:</small><br>
        <div class="qr-box"><img id="qr" src=""></div>
        <button class="button-auto" onclick="autoConnect()">الاتصال التلقائي 🔌</button>
    </div>

    <div class="ad-container" id="ad1">
        <!-- إعلان 1 -->
        <script async="async" data-cfasync="false" src="https://pl28641370.effectivegatecpm.com/c97b215a97c5616003e9a63f4de99e31/invoke.js"></script>
        <div id="container-c97b215a97c5616003e9a63f4de99e31"></div>
    </div>
</div>

<div class="ad-container" style="margin-top: 30px;" id="ad2">
    <!-- إعلان 2 -->
    <script>
      atOptions = {
        'key' : '0f39541415ecc961725523d9f7199205',
        'format' : 'iframe',
        'height' : 250,
        'width' : 300,
        'params' : {}
      };
    </script>
    <script src="https://www.highperformanceformat.com/0f39541415ecc961725523d9f7199205/invoke.js"></script>
</div>

<script>
function calc() {
    const ssid = document.getElementById('ssid').value.trim();
    if(!ssid) return alert("يرجى إدخال اسم الشبكة (SSID)");

    let h = ssid.includes('_') ? ssid.split('_')[1] : ssid;
    if(h.length > 6) h = h.slice(-6);

    const map = {'0':'f','1':'e','2':'d','3':'c','4':'b','5':'a','6':'9','7':'8','8':'7','9':'6','a':'5','b':'4','c':'3','d':'2','e':'1','f':'0'};
    let converted = "";
    for(let ch of h.toLowerCase()) converted += map[ch] || ch;

    const password = "wlan" + converted;

    const passEl = document.getElementById('pass');
    passEl.innerText = password;

    passEl.onclick = () => {
        navigator.clipboard.writeText(password);
        alert("تم نسخ كلمة السر!");
    }

    document.getElementById('qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent('WIFI:S:'+ssid+';T:WPA;P:'+password+';;')}`;

    document.getElementById('res').style.display = 'block';
    document.getElementById('ad1').style.display = 'none';
    document.getElementById('ad2').style.display = 'none';

    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

function resetFields() {
    document.getElementById('ssid').value = '';
    document.getElementById('res').style.display = 'none';
    document.getElementById('ad1').style.display = 'flex';
    document.getElementById('ad2').style.display = 'flex';
}

function toggleTheme() {
    if(document.body.style.background === "white") {
        document.body.style.background = "#121212";
        document.body.style.color = "#fff";
    } else {
        document.body.style.background = "white";
        document.body.style.color = "#000";
    }
}

function autoConnect() {
    const ssid = document.getElementById('ssid').value.trim();
    const password = document.getElementById('pass').innerText;
    if(!ssid || !password) return alert("يرجى توليد كلمة السر أولاً");

    const wifiLink = `wifi://ssid=${encodeURIComponent(ssid)}&password=${encodeURIComponent(password)}&type=WPA`;
    window.location.href = wifiLink;
    alert("إذا كان جهازك يدعم بروتوكول wifi، سيتم محاولة الاتصال تلقائياً.");
}
</script>

</body>
</html>
